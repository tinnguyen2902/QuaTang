spring.application.name=QuaTang

# Database connection using Environment Variables with fallbacks
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/QuaTang?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123}

# JPA Settings
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}
spring.jpa.show-sql=${DB_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Settings
spring.flyway.baseline-on-migrate=true