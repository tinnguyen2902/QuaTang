<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sản Phẩm</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/product.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main>
    <div class="product-page-container">
        <!-- Sidebar Filter -->
        <aside class="product-sidebar">
            <h3>Danh Mục</h3>
            <div class="filter-group">
                <label><input type="checkbox"> Quà sinh nhật</label>
                <label><input type="checkbox"> Quà kỷ niệm</label>
                <label><input type="checkbox"> Đồ lưu niệm văn phòng</label>
            </div>

            <h3>Mức Giá</h3>
            <div class="filter-group">
                <label><input type="radio" name="price"> Dưới 100k</label>
                <label><input type="radio" name="price"> Từ 100k - 500k</label>
                <label><input type="radio" name="price"> Trên 500k</label>
            </div>
        </aside>

        <!-- Product Grid -->
        <section class="product-grid-wrapper">
            <h2 style="margin-top: 0;">Tất Cả Sản Phẩm</h2>
            <div class="product-grid">
                <div th:each="product : ${products.content}"
                     th:replace="~{fragments/product-card :: product-card(${product})}">
                </div>
                <!-- Empty state -->
                <div th:if="${products.empty}" style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <p>Chưa có sản phẩm nào.</p>
                </div>
            </div>
            <!-- Pagination -->
            <div class="pagination" th:if="${products.totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                   th:href="@{/products(page=${i})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? ' active' : ''">1</a>
            </div>
        </section>
    </div>
</main>

<hr class="section-divider">

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
