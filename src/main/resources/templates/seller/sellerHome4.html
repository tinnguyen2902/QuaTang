<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sản Phẩm Của Tôi - TD Nuts</title>
    <!-- Đường dẫn tĩnh chuẩn cấu trúc thư mục Spring Boot / Thymeleaf -->
    <link rel="stylesheet" th:href="@{/css/seller/seller.css}" />
</head>
<body>
<div class="phone-container">

    <!-- 1. APP HEADER -->
    <div class="app-header">
        <span th:onclick="|window.location.href='@{/admin}'|">←</span>
        <div class="header-title">Sản phẩm của Tôi</div>
        <div class="header-icons">🔍 💬</div>
    </div>

    <!-- 2. SUB TABS -->
    <div class="sub-tabs">
        <div class="sub-tab-item active">Còn hàng (12)</div>
        <div class="sub-tab-item">Hết hàng (12)</div>
        <div class="sub-tab-item">Chờ duyệt (0)</div>
    </div>

    <!-- 3. SCREEN CONTENT -->
    <div class="screen-content product-screen">
        <!-- Sản phẩm 1 -->
        <div class="product-item-card">
            <div class="product-info-block">
                <div class="product-img">🥭</div>
                <div class="product-detail">
                    <div class="product-title">
                        TD Nuts Xoài Sấy Dẻo 500g & Hạt Macca Nứt Vỏ Thơm Ngon Loại 1
                    </div>
                    <div class="product-price-orange">₫241.000</div>
                </div>
            </div>
            <div class="stock-info">
                <span>Tồn kho: <strong class="stock-num">200</strong></span>
                <span>Đã bán: <strong>0</strong></span>
            </div>
            <div class="product-actions-grid">
                <button class="btn-mini">Xem</button>
                <button class="btn-mini edit">Sửa</button>
            </div>
        </div>

        <!-- Sản phẩm 2 -->
        <div class="product-item-card">
            <div class="product-info-block">
                <div class="product-img">☕</div>
                <div class="product-detail">
                    <div class="product-title">
                        [TD Nuts] Combo Trà Chiều: Bánh Thuyền Hạt Điều Mix Quả Khô
                    </div>
                    <div class="product-price-orange">₫257.000</div>
                </div>
            </div>
            <div class="stock-info">
                <span>Tồn kho: <strong class="stock-num">199</strong></span>
                <span>Đã bán: <strong>1</strong></span>
            </div>
            <div class="product-actions-grid">
                <button class="btn-mini">Xem</button>
                <button class="btn-mini edit">Sửa</button>
            </div>
        </div>
    </div>

    <!-- 4. NÚT CỐ ĐỊNH PHÍA TRÊN BOTTOM NAV -->
    <div class="fixed-bottom-btn">
        <button class="btn-block">＋ Thêm sản phẩm mới</button>
    </div>

    <!-- 5. BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" th:onclick="|window.location.href='@{/admin}'|">
            <span class="nav-icon">🏠</span>Trang chủ
        </div>
        <div class="nav-item"><span class="nav-icon">💬</span>Trò chuyện</div>
        <div class="nav-item"><span class="nav-icon">📈</span>Tiếp thị</div>
        <div class="nav-item"><span class="nav-icon">👤</span>Tôi</div>
    </div>
</div>
</body>
</html>
